<!DOCTYPE html>
<html>
<head>
<style>
    :root { --navy: #1a365d; --green: #2ecc71; --slate: #64748b; }
    body { font-family: 'Inter', sans-serif; background: #f4f7f6; padding: 40px; }
    .checklist-card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); max-width: 600px; margin: auto; }
    h2 { color: var(--navy); border-bottom: 2px solid var(--green); padding-bottom: 10px; margin-bottom: 20px; }
    .item { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
    .item:last-child { border-bottom: none; }
    input[type="checkbox"] { width: 20px; height: 20px; margin-right: 15px; cursor: pointer; accent-color: var(--green); }
    .item label { font-size: 14px; color: #444; cursor: pointer; }
    .category { font-size: 11px; font-weight: 800; color: var(--slate); text-transform: uppercase; margin-top: 20px; letter-spacing: 1px; }
</style>
</head>
<body>

<div class="checklist-card">
    <h2>Fidelis Submission Checklist</h2>
    <p style="font-size: 12px; color: var(--slate);">Verify all documents per Appendix C before submitting to CEO/ShareFile.</p>

    <div class="category">Borrower Essentials</div>
    <div class="item"><input type="checkbox" id="c1"><label for="c1">1. Credit Report (Last 90 Days)</label></div>
    <div class="item"><input type="checkbox" id="c2"><label for="c2">2. Loan Application (1003)</label></div>
    <div class="item"><input type="checkbox" id="c3"><label for="c3">3. Entity Docs (Articles / Operating Agmt)</label></div>
    <div class="item"><input type="checkbox" id="c4"><label for="c4">4. Experience Track Record (SREO)</label></div>

    <div class="category">Property & Value</div>
    <div class="item"><input type="checkbox" id="c5"><label for="c5">5. Full/Hybrid Appraisal</label></div>
    <div class="item"><input type="checkbox" id="c6"><label for="c6">6. Detailed Rehab Budget (Hard Costs)</label></div>
    <div class="item"><input type="checkbox" id="c7"><label for="c7">7. Purchase & Sale Agreement</label></div>

    <div class="category">Compliance & Closing</div>
    <div class="item"><input type="checkbox" id="c8"><label for="c8">8. Title Report (100% Coverage)</label></div>
    <div class="item"><input type="checkbox" id="c9"><label for="c9">9. HOI Dec Page (100% Loan Coverage)</label></div>
    <div class="item"><input type="checkbox" id="c10"><label for="c10">10. Certificate of Non-Owner Occupancy</label></div>
    
    <button onclick="window.print()" style="margin-top:25px; width:100%; padding:15px; background:var(--navy); color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">Download/Print Checklist</button>
</div>

</body>
</html>
